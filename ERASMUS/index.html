<!DOCTYPE html>
<html>

<head>
    <title>3D GAME</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div id="container">
        <div id="world"> </div>
         <div id="menuStartowe" class="menu" style="display:block">
            <div id="startGame" class="button">
                <p>Start game</p>
            </div>
            <div id="instructionsButton" class="button">
                <p>Instructions</p>
            </div>
            <div id="rulesButton" class="button">
                <p>Rules</p>
            </div>
        </div>
        
        <div id="menuInstructions" class="menu">
            <p style="font-size:30px;top:250px;">
                <strong>Control keys</strong><br>
                w - Go Forward<br>
                s - Go Back<br>
                d - Go Right<br>
                a - Go Left<br>
                Space - Jumping<br>
                You can play using English keyboard!
            </p>
            <div id="backButtonInstructions" class="button">
                <p>Back</p>
            </div>
        </div>

        <div id="menuRules" class="menu">
            <p style= "font-size:30px;top:250px;">
                <strong>Game rules</strong> <br>
                Collect as many coins as possible <br> 
                Find the key <br> 
                Open the portal <br> 
                Have fun and stay hydrated <br> 
            </p>
            <div id="backButtonRules" class="button">
                <p>Back</p>
            </div>
        </div>
    </div>
</body>

</html>

<script src="script.js"></script>
<script src="menu.js"></script>
